<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>宝宝双语认知卡</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#fafafa;text-align:center}
header{padding:12px;font-size:24px;font-weight:bold}
.card{max-width:900px;margin:auto;padding:10px}
img{width:90%;max-height:60vh;object-fit:cover;border-radius:16px}
.word{font-size:40px;margin:10px}
.es{font-size:30px;color:#555}
button{font-size:24px;padding:14px 24px;margin:8px;border-radius:12px}
</style>
</head>
<body>
<header>宝宝双语认知卡（中文+Español）</header>
<div class="card">
<img id="img" src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=1200" alt="">
<div class="word" id="zh">苹果</div>
<div class="es" id="es">Manzana</div>
<div>
<button onclick="speakCurrent()">🔊 播放</button>
<button onclick="nextCard()">➡ 下一张</button>
</div>
</div>
<script>
const cards=[
{zh:"苹果",es:"Manzana",img:"https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=1200"},
{zh:"香蕉",es:"Banana",img:"https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=1200"},
{zh:"小狗",es:"Perro",img:"https://images.unsplash.com/photo-1517849845537-4d257902454a?w=1200"},
{zh:"小猫",es:"Gato",img:"https://images.unsplash.com/photo-1519052537078-e6302a4968d4?w=1200"},
{zh:"汽车",es:"Coche",img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200"}
];
let idx=0;
function render(){
const c=cards[idx];
img.src=c.img;
zh.textContent=c.zh;
es.textContent=c.es;
}
function speak(text,lang){
return new Promise(r=>{
const u=new SpeechSynthesisUtterance(text);
u.lang=lang;
u.onend=r;
speechSynthesis.speak(u);
});
}
async function speakCurrent(){
const c=cards[idx];
await speak(c.zh,"zh-CN");
setTimeout(()=>speak(c.es,"es-ES"),500);
}
function nextCard(){
idx=(idx+1)%cards.length;
render();
}
render();
</script>
</body>
</html>
