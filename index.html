            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .audio-btn {
            background: #fbd26a;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;

        .lang-icon { font-size: 1.9rem; }
        .target-word-hint {
            font-size: 1.6rem;
            background: #e3f0e8;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            color: #2c5a2e;
            font-weight: bold;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin: 25px 0 20px;
        }
        .card {
            background: white;
            border-radius: 48px;
            padding: 20px 12px 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 15px 20px rgba(0, 0, 0, 0.2);
            border: 4px solid #ffdd99;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card:active { transform: scale(0.97); }
        .card-img {
            width: 100%;
            max-width: 180px;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 40px;
            background-color: #f7f0e0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
        }
        .card-emoji-fallback {
            font-size: 5rem;
            display: none;
            margin-bottom: 10px;
        }
        .card-img.error-img {
            display: none;
        }
        .card-img.error-img + .card-emoji-fallback {
            display: block;
        }
        .word-label {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a6a3b;
            background: #fff2cf;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 60px;
        }
        .feedback-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            z-index: 200;
            pointer-events: none;
            animation: fadePop 0.6s forwards;
            background: rgba(255,255,240,0.95);
            padding: 15px 30px;
            border-radius: 60px;
            white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        @keyframes fadePop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5);}
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1);}
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1);}
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8);}
        }
        .footer-note {
            text-align: center;
            font-size: 1rem;
            color: #a5662a;
            margin-top: 10px;

            .game-container { padding: 15px; }
            .audio-btn { font-size: 1.2rem; padding: 8px 20px; }
            .score-area { font-size: 1.2rem; }

            .word-label { font-size: 0.9rem; }
            .card-emoji-fallback { font-size: 3rem; }
            .card-img { max-width: 120px; }
            .feedback-overlay { font-size: 1.8rem; padding: 10px 20px; white-space: nowrap; }

    // 为图片添加清晰度参数（Pexels 支持添加参数来调整图片大小和质量）
    function getOptimizedImageUrl(url) {
        if (!url) return "";
        // Pexels 图片可以通过添加参数来调整大小，例如 ?auto=compress&w=300&h=300
        if (url.includes('pexels.com')) {
            // 移除已有的查询参数
            const baseUrl = url.split('?')[0];
            return `${baseUrl}?auto=compress&w=300&h=300&fit=crop`;
        }
        return url;
    }

    let audioCtx = null;

    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.log("Web Audio not supported"); }
    }

    function playCorrectSound() {
        try {
            initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.3;
            const osc1 = audioCtx.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.value = 880;
            osc1.connect(gain);
            osc1.start(now);
            osc1.stop(now + 0.2);
            const osc2 = audioCtx.createOscillator();
            osc2.type = 'sine';
            osc2.frequency.value = 1100;
            osc2.connect(gain);
            osc2.start(now + 0.15);
            osc2.stop(now + 0.35);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        } catch(e) {}
    }

    function playWrongSound() {
        try {
            initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const gain = audioCtx.createGain();
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.25;
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = 480;
            osc.connect(gain);
            osc.start(now);
            osc.stop(now + 0.4);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
        } catch(e) {}
    }

    function speakText(text, lang, retryCount = 0) {
        if (!text) return;
        if (speechSynth.speaking) speechSynth.cancel();
        const trySpeak = () => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.85;
            utterance.pitch = 1.15;
            utterance.volume = 1;
            utterance.onerror = () => {
                if (retryCount < 1) setTimeout(() => speakText(text, lang, retryCount + 1), 100);
            };
            speechSynth.speak(utterance);
        };
        if (speechSynth.getVoices().length === 0) {
            speechSynth.onvoiceschanged = () => { trySpeak(); };
        } else {
            trySpeak();
        }
    }

    function showFeedback(isCorrect) {
        const div = document.createElement('div');
        div.className = 'feedback-overlay';
        if (isCorrect) {
            div.innerHTML = '✅ 答对了！真棒！ 🎉';
            div.style.backgroundColor = "#d4edda";
            div.style.color = "#2e7d32";
            playCorrectSound();
            setTimeout(() => speakText("答对了！你真棒！", "zh-CN"), 80);
        } else {
            div.innerHTML = '❌ 再试试看，加油！ 💪';
            div.style.backgroundColor = "#f8d7da";
            div.style.color = "#c62828";
            playWrongSound();
            setTimeout(() => speakText("再试试看，加油！", "zh-CN"), 80);
        }
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    // 创建卡片：优先加载网络实物图片，加载失败则显示 Emoji
    function createCard(opt) {
        const card = document.createElement('div');
        card.className = 'card';
        
        const img = document.createElement('img');
        img.className = 'card-img';
        const optimizedUrl = getOptimizedImageUrl(opt.img);
        img.src = optimizedUrl;
        img.alt = opt.cn;
        
        const emojiFallback = document.createElement('div');
        emojiFallback.className = 'card-emoji-fallback';
        emojiFallback.textContent = opt.emoji;
        emojiFallback.style.display = 'none';
        
        img.onerror = function() {
            img.style.display = 'none';
            emojiFallback.style.display = 'block';
            card.classList.add('show-emoji');
        };
        
        const label = document.createElement('div');
        label.className = 'word-label';
        label.innerText = `${opt.cn} | ${opt.es}`;
        
        card.appendChild(img);
        card.appendChild(emojiFallback);
        card.appendChild(label);
        
        card.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!canSelect) return;
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            const isMatch = (opt.cn === currentQuestionWord.cn && opt.es === currentQuestionWord.es);
            if (isMatch) {
                showFeedback(true);
                currentScore++;
                document.getElementById('scoreValue').innerText = currentScore;
                canSelect = false;
                setTimeout(() => loadNewQuiz(), 950);
            } else {
                showFeedback(false);
            }
        });
        
        return card;
    }

    function renderCards() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';
        currentOptions.forEach(opt => {
            const card = createCard(opt);
            container.appendChild(card);
        });
    }

    function generateRandomQuiz() {
        const targetIndex = Math.floor(Math.random() * vocabulary.length);
        const target = { ...vocabulary[targetIndex] };
        const selected = new Set();
        selected.add(targetIndex);
        while (selected.size < 4) {
            selected.add(Math.floor(Math.random() * vocabulary.length));
        }
        let options = Array.from(selected).map(i => ({ ...vocabulary[i] }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return { target, options };
    }

    function loadNewQuiz() {
        const { target, options } = generateRandomQuiz();
        currentQuestionWord = target;
        currentOptions = options;
        renderCards();
        document.getElementById('targetHint').innerHTML = `🎈 听一听，点一点: ${target.cn} · ${target.es} 🎈`;
        canSelect = true;
    }

    function playChinese() { if (currentQuestionWord) speakText(currentQuestionWord.cn, 'zh-CN'); }
    function playSpanish() { if (currentQuestionWord) speakText(currentQuestionWord.es, 'es-ES'); }

    document.getElementById('playChineseBtn').addEventListener('click', () => {
        initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        playChinese();
    });
    document.getElementById('playSpanishBtn').addEventListener('click', () => {
        initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        playSpanish();
    });
    document.getElementById('nextGameBtn').addEventListener('click', () => { if (canSelect) loadNewQuiz(); });

    if (speechSynth) speechSynth.getVoices();
    loadNewQuiz();
</script>
</body>
