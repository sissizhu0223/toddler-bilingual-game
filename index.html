<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>宝宝双语认知乐园 - 中文 & Español | 高对比度Emoji版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #b8e1fc 0%, #f9e6b3 100%);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 248, 225, 0.95);
            border-radius: 80px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            padding: 20px 25px 35px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 0 15px;
        }
        .score-area {
            background: #ffefc0;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #d64933;
            box-shadow: inset 0 -2px 0 #c29b4a, 0 6px 12px rgba(0,0,0,0.1);
        }
        .score-area span { font-size: 2rem; color: #2b6e4e; }
        .new-quiz-btn {
            background: #ffa559;
            border: none;
            font-size: 1.3rem;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #b4622a;
            transition: 0.05s linear;
            font-family: inherit;
        }
        .new-quiz-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b4622a; }
        .question-zone {
            background: #fff9ed;
            border-radius: 70px;
            margin: 10px 0 30px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }
        .speak-panel {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .audio-btn {
            background: #fbd26a;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b87333;
            transition: 0.05s linear;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: #3b2a1f;
        }
        .audio-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b87333; }
        .lang-icon { font-size: 1.9rem; }
        .target-word-hint {
            font-size: 1.6rem;
            background: #e3f0e8;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            color: #2c5a2e;
            font-weight: bold;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin: 25px 0 20px;
        }
        .card {
            background: white;
            border-radius: 48px;
            padding: 30px 12px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 15px 20px rgba(0, 0, 0, 0.2);
            border: 4px solid #ffdd99;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffffff 0%, #fff8e7 100%);
        }
        .card:active { transform: scale(0.96); }
        .card-emoji {
            font-size: 5.5rem;
            margin-bottom: 15px;
            display: block;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .word-label {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a6a3b;
            background: #fff2cf;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
        }
        .feedback-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            z-index: 200;
            pointer-events: none;
            animation: fadePop 0.6s forwards;
            background: rgba(255,255,240,0.95);
            padding: 15px 30px;
            border-radius: 60px;
            white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        @keyframes fadePop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5);}
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1);}
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1);}
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8);}
        }
        .footer-note {
            text-align: center;
            font-size: 1rem;
            color: #a5662a;
            margin-top: 10px;
        }
        @media (max-width: 600px) {
            .game-container { padding: 15px; }
            .audio-btn { font-size: 1.2rem; padding: 8px 20px; }
            .score-area { font-size: 1.2rem; }
            .cards-grid { gap: 12px; }
            .word-label { font-size: 0.9rem; }
            .card-emoji { font-size: 3.5rem; }
            .feedback-overlay { font-size: 1.8rem; padding: 10px 20px; }
        }
        
        /* 正确/错误卡片的临时效果 */
        .card-correct-effect {
            background: #c8e6c9 !important;
            transform: scale(0.98);
            transition: 0.05s;
        }
        .card-wrong-effect {
            background: #ffcdd2 !important;
            transform: scale(0.98);
            transition: 0.05s;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div class="score-area">🏆 得分 <span id="scoreValue">0</span></div>
        <button class="new-quiz-btn" id="nextGameBtn">🎲 新题目 🎲</button>
    </div>
    <div class="question-zone">
        <div class="speak-panel">
            <button class="audio-btn" id="playChineseBtn">🇨🇳 中文 <span class="lang-icon">🔊</span></button>
            <button class="audio-btn" id="playSpanishBtn">🇪🇸 Español <span class="lang-icon">🔊</span></button>
        </div>
        <div class="target-word-hint" id="targetHint">⭐ 点击喇叭听单词，再点图片 ⭐</div>
    </div>
    <div class="cards-grid" id="cardsContainer"></div>
    <div class="footer-note">
        🌟 点击图片选择 — 答对✅得分并换题，答错❌可以继续尝试 🌟
    </div>
</div>

        { cn: "小船", es: "barco", emoji: "⛵" },
        { cn: "卡车", es: "camión", emoji: "🚛" },
        { cn: "葡萄", es: "uva", emoji: "🍇" },
        { cn: "西瓜", es: "sandía", emoji: "🍉" },
        { cn: "草莓", es: "fresa", emoji: "🍓" },
        { cn: "玉米", es: "maíz", emoji: "🌽" },
        { cn: "胡萝卜", es: "zanahoria", emoji: "🥕" },
        { cn: "西红柿", es: "tomate", emoji: "🍅" },
        { cn: "洋葱", es: "cebolla", emoji: "🧅" },
        { cn: "柠檬", es: "limón", emoji: "🍋" },
        { cn: "企鹅", es: "pingüino", emoji: "🐧" },
        { cn: "老虎", es: "tigre", emoji: "🐯" },
        { cn: "挖掘机", es: "excavadora", emoji: "🏗️" }
    ];

    let currentQuestionWord = null;
    let currentOptions = [];
    let currentScore = 0;
    let canSelect = true;
    let speechSynth = window.speechSynthesis;
    let audioCtx = null;

    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.log("Web Audio not supported"); }
    }

    function playCorrectSound() {
        try {
            initAudio();
            if (audioCtx && audioCtx.state !== 'closed') {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const gain = audioCtx.createGain();
                gain.connect(audioCtx.destination);
                gain.gain.value = 0.3;
                const osc1 = audioCtx.createOscillator();
                osc1.type = 'sine';
                osc1.frequency.value = 880;
                osc1.connect(gain);
                osc1.start(now);
                osc1.stop(now + 0.2);
                const osc2 = audioCtx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.value = 1100;
                osc2.connect(gain);
                osc2.start(now + 0.15);
                osc2.stop(now + 0.35);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
                return;
            }
        } catch(e) {}
    }

    function playWrongSound() {
        try {
            initAudio();
            if (audioCtx && audioCtx.state !== 'closed') {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const gain = audioCtx.createGain();
                gain.connect(audioCtx.destination);
                gain.gain.value = 0.25;
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.value = 480;
                osc.connect(gain);
                osc.start(now);
                osc.stop(now + 0.4);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
                return;
            }
        } catch(e) {}
    }

    function speakText(text, lang, retryCount = 0) {
        if (!text) return;
        if (speechSynth.speaking) speechSynth.cancel();
        const trySpeak = () => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.85;
            utterance.pitch = 1.15;
            utterance.volume = 1;
            utterance.onerror = () => {
                if (retryCount < 1) setTimeout(() => speakText(text, lang, retryCount + 1), 100);
            };
            speechSynth.speak(utterance);
        };
        if (speechSynth.getVoices().length === 0) {
            speechSynth.onvoiceschanged = () => { trySpeak(); };
        } else {
            trySpeak();
        }
    }

    function showFeedback(isCorrect) {
        const div = document.createElement('div');
        div.className = 'feedback-overlay';
        if (isCorrect) {
            div.innerHTML = '✅ 答对了！真棒！ 🎉';
            div.style.backgroundColor = "#d4edda";
            div.style.color = "#2e7d32";
            playCorrectSound();
            setTimeout(() => speakText("答对了！你真棒！", "zh-CN"), 80);
        } else {
            div.innerHTML = '❌ 再试试看，加油！ 💪';
            div.style.backgroundColor = "#f8d7da";
            div.style.color = "#c62828";
            playWrongSound();
            setTimeout(() => speakText("再试试看，加油！", "zh-CN"), 80);
        }
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function createCard(opt) {
        const card = document.createElement('div');
        card.className = 'card';
        
        const emojiSpan = document.createElement('div');
        emojiSpan.className = 'card-emoji';
        emojiSpan.textContent = opt.emoji;
        
        const label = document.createElement('div');
        label.className = 'word-label';
        label.innerText = `${opt.cn} | ${opt.es}`;
        
        card.appendChild(emojiSpan);
        card.appendChild(label);
        
        card.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!canSelect) return;
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            const isMatch = (opt.cn === currentQuestionWord.cn && opt.es === currentQuestionWord.es);
            
            // 添加点击效果
            card.style.transform = 'scale(0.96)';
            setTimeout(() => { card.style.transform = ''; }, 150);
            
            if (isMatch) {
                showFeedback(true);
                currentScore++;
                document.getElementById('scoreValue').innerText = currentScore;
                canSelect = false;
                setTimeout(() => loadNewQuiz(), 950);
            } else {
                showFeedback(false);
            }
        });
        
        return card;
    }

    function renderCards() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';
        currentOptions.forEach(opt => {
            const card = createCard(opt);
            container.appendChild(card);
        });
    }

    function generateRandomQuiz() {
        const targetIndex = Math.floor(Math.random() * vocabulary.length);
        const target = { ...vocabulary[targetIndex] };
        const selected = new Set();
        selected.add(targetIndex);
        while (selected.size < 4) {
            selected.add(Math.floor(Math.random() * vocabulary.length));
        }
        let options = Array.from(selected).map(i => ({ ...vocabulary[i] }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return { target, options };
    }

    function loadNewQuiz() {
        const { target, options } = generateRandomQuiz();
        currentQuestionWord = target;
        currentOptions = options;
        renderCards();
        document.getElementById('targetHint').innerHTML = `🎈 听一听，点一点: ${target.cn} · ${target.es} 🎈`;
        canSelect = true;
    }

    function playChinese() { if (currentQuestionWord) speakText(currentQuestionWord.cn, 'zh-CN'); }
    function playSpanish() { if (currentQuestionWord) speakText(currentQuestionWord.es, 'es-ES'); }

    document.getElementById('playChineseBtn').addEventListener('click', () => {
        initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        playChinese();
    });
    document.getElementById('playSpanishBtn').addEventListener('click', () => {
        initAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        playSpanish();
    });
    document.getElementById('nextGameBtn').addEventListener('click', () => { if (canSelect) loadNewQuiz(); });

    if (speechSynth) speechSynth.getVoices();
    loadNewQuiz();
</script>
